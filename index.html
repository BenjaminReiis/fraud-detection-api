<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud Detection — Security Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060810;color:#c8d4e8;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;user-select:none}

/* SCANLINES overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:9999}

.mono{font-family:'Share Tech Mono',monospace}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #1a2236;background:#080b12;position:relative;z-index:10}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo-box{display:flex;align-items:center;gap:8px}
.logo-hex{width:32px;height:32px;position:relative}
.logo-hex svg{width:32px;height:32px}
.sys-name{font-family:'Share Tech Mono',monospace;font-size:15px;color:#e0eaff;letter-spacing:.08em}
.sys-ver{font-size:10px;color:#3a5080;letter-spacing:.05em;font-family:'Share Tech Mono',monospace}
.topbar-center{display:flex;gap:24px}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:4px 16px;border-left:1px solid #1a2236}
.sp-val{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700}
.sp-lbl{font-size:9px;color:#3a5080;letter-spacing:.05em;text-transform:uppercase}
.sp-val.green{color:#00ff88}.sp-val.amber{color:#ffb800}.sp-val.red{color:#ff3355}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:11px;color:#00ff88;padding:5px 10px;border:1px solid #003322;border-radius:2px;background:rgba(0,255,136,.04)}
.blink{width:6px;height:6px;border-radius:50%;background:#00ff88;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 6px #00ff88}50%{opacity:.3;box-shadow:none}}
.threat-level{font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 12px;border-radius:2px;border:1px solid;letter-spacing:.05em}
.tl-low{color:#00ff88;border-color:#003322;background:rgba(0,255,136,.04)}
.tl-med{color:#ffb800;border-color:#332200;background:rgba(255,184,0,.04)}
.tl-high{color:#ff3355;border-color:#330011;background:rgba(255,51,85,.04);animation:flashborder 1.5s infinite}
@keyframes flashborder{0%,100%{border-color:#330011}50%{border-color:#ff3355}}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:280px 1fr 320px;grid-template-rows:1fr 180px;height:calc(100vh - 57px);gap:1px;background:#0d1220}

/* PANELS */
.panel{background:#080b12;padding:0;overflow:hidden;position:relative;border:1px solid #111827}
.ph{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #111827;background:#060810}
.ph-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:#3a6090;letter-spacing:.1em;text-transform:uppercase}
.ph-badge{font-family:'Share Tech Mono',monospace;font-size:10px;color:#1a3050;border:1px solid #1a3050;padding:2px 6px;border-radius:2px}

/* ALERT QUEUE — LEFT */
.alert-list{height:calc(100% - 36px);overflow-y:auto;padding:8px}
.alert-list::-webkit-scrollbar{width:4px}
.alert-list::-webkit-scrollbar-thumb{background:#1a2236;border-radius:2px}

.alert-item{padding:10px 12px;border-radius:3px;margin-bottom:6px;border-left:3px solid;cursor:pointer;transition:background .15s;position:relative;overflow:hidden}
.alert-item::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.03) 0%,transparent 100%)}
.alert-item:hover{filter:brightness(1.15)}
.alert-item.low{border-color:#00ff88;background:rgba(0,255,136,.04)}
.alert-item.medium{border-color:#ffb800;background:rgba(255,184,0,.04)}
.alert-item.high{border-color:#ff3355;background:rgba(255,51,85,.04)}
.alert-item.high.new{animation:flashitem 2s ease-out}
@keyframes flashitem{0%{box-shadow:inset 0 0 20px rgba(255,51,85,.4)}100%{box-shadow:none}}
.ai-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ai-id{font-family:'Share Tech Mono',monospace;font-size:11px;color:#4a6090}
.ai-score{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700}
.ai-score.low{color:#00ff88}.ai-score.medium{color:#ffb800}.ai-score.high{color:#ff3355}
.ai-user{font-size:12px;color:#8899b3;margin-bottom:2px}
.ai-meta{display:flex;gap:8px;font-size:10px;color:#3a5070;font-family:'Share Tech Mono',monospace}
.ai-status{font-size:9px;padding:2px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.05em;font-family:'Share Tech Mono',monospace}
.ai-status.low{background:rgba(0,255,136,.1);color:#00ff88}
.ai-status.medium{background:rgba(255,184,0,.1);color:#ffb800}
.ai-status.high{background:rgba(255,51,85,.1);color:#ff3355}

/* CENTER — SCANNER */
.center-panel{display:flex;flex-direction:column}
.scanner-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

/* Radar */
.radar-wrap{position:relative;width:320px;height:320px}
.radar-rings circle{fill:none;stroke:#0d2040;stroke-width:1}
.radar-cross line{stroke:#0d2040;stroke-width:1}
.radar-sweep{transform-origin:160px 160px;animation:sweep 3s linear infinite}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.radar-sweep-path{fill:url(#sweepGrad)}
.tx-dot{position:absolute;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);transition:all .3s}
.tx-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;animation:ping 1.5s ease-out forwards}
@keyframes ping{0%{box-shadow:0 0 0 0 currentColor;opacity:1}100%{box-shadow:0 0 0 12px transparent;opacity:0}}

/* Scan result box */
.scan-result{position:absolute;right:0;top:50%;transform:translateY(-50%);width:200px;display:flex;flex-direction:column;gap:8px}
.scan-line{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#0d1220;border:1px solid #111827;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:11px}
.sl-lbl{color:#3a5070}
.sl-val{font-weight:700}
.sl-val.ok{color:#00ff88}.sl-val.warn{color:#ffb800}.sl-val.bad{color:#ff3355}.sl-val.neutral{color:#5588bb}

/* Active TX display */
.active-tx{padding:14px 20px;border-top:1px solid #111827;background:#060810;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.atx-item{display:flex;flex-direction:column;gap:2px}
.atx-lbl{font-size:9px;color:#3a5070;text-transform:uppercase;letter-spacing:.06em;font-family:'Share Tech Mono',monospace}
.atx-val{font-family:'Share Tech Mono',monospace;font-size:13px;color:#8899b3}
.atx-val.highlight{color:#e0eaff}

/* RIGHT — THREAT FEED */
.threat-feed{height:calc(100% - 36px);overflow-y:auto;font-family:'Share Tech Mono',monospace;padding:0}
.threat-feed::-webkit-scrollbar{width:4px}
.threat-feed::-webkit-scrollbar-thumb{background:#1a2236;border-radius:2px}
.tf-row{display:grid;grid-template-columns:48px 1fr 44px;gap:8px;padding:8px 12px;border-bottom:1px solid #0d1220;font-size:11px;align-items:center;transition:background .2s}
.tf-row:hover{background:#0d1220}
.tf-time{color:#2a3a55}
.tf-body{display:flex;flex-direction:column;gap:1px}
.tf-user{color:#6680a0;font-size:11px}
.tf-flag{font-size:10px;color:#2a4060}
.tf-score{text-align:right;font-weight:700;font-size:13px}
.tf-score.low{color:#00ff88}.tf-score.medium{color:#ffb800}.tf-score.high{color:#ff3355}

/* BOTTOM BAR — chart */
.bottom-bar{grid-column:1/-1;background:#060810;border-top:1px solid #111827;display:flex;flex-direction:column;padding:8px 16px 8px}
.chart-wrap{flex:1;position:relative}

/* CONTROLS OVERLAY */
.controls{position:absolute;bottom:12px;right:16px;display:flex;gap:8px;z-index:20}
.ctrl-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 12px;border:1px solid #1a2a44;border-radius:2px;background:#0a0f1a;color:#3a6090;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.ctrl-btn:hover{border-color:#2a4a7a;color:#6aa0e0;background:#0d1525}
.ctrl-btn.active{border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,.06)}

/* THREAT INDICATOR */
.threat-map{padding:0 14px 12px;display:grid;grid-template-columns:repeat(2,1fr);gap:6px;overflow-y:auto;max-height:calc(100% - 36px)}
.country-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#0a0f1a;border:1px solid #111827;border-radius:2px}
.cr-flag{font-size:14px}
.cr-name{font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a6080}
.cr-bar-wrap{flex:1;margin:0 8px;height:3px;background:#111827;border-radius:2px;overflow:hidden}
.cr-bar{height:100%;border-radius:2px;transition:width .5s}
.cr-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:#3a5070}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-box">
      <div class="logo-hex">
        <svg viewBox="0 0 32 32"><polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#ff3355" stroke-width="1.5"/><text x="16" y="20" text-anchor="middle" font-family="Share Tech Mono" font-size="10" fill="#ff3355">FD</text></svg>
      </div>
      <div><div class="sys-name mono">FRAUD·DETECTION·API</div><div class="sys-ver mono">SOC MONITOR v2.1.0 — PT-BR</div></div>
    </div>
  </div>
  <div class="topbar-center">
    <div class="stat-pill"><span class="sp-val green mono" id="st-app">0</span><span class="sp-lbl">aprovadas</span></div>
    <div class="stat-pill"><span class="sp-val amber mono" id="st-rev">0</span><span class="sp-lbl">revisão</span></div>
    <div class="stat-pill"><span class="sp-val red mono" id="st-blk">0</span><span class="sp-lbl">bloqueadas</span></div>
    <div class="stat-pill"><span class="sp-val mono" id="st-total" style="color:#5588bb">0</span><span class="sp-lbl">total</span></div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><span class="blink"></span> LIVE STREAM</div>
    <div class="threat-level tl-low mono" id="threat-lvl">THREAT: LOW</div>
  </div>
</div>

<div class="main">

  <!-- LEFT: Alert Queue -->
  <div class="panel" style="grid-row:1/2">
    <div class="ph"><span class="ph-title">fila de alertas</span><span class="ph-badge mono" id="queue-count">0 eventos</span></div>
    <div class="alert-list" id="alert-list"></div>
  </div>

  <!-- CENTER: Scanner -->
  <div class="panel center-panel" style="grid-row:1/2">
    <div class="ph"><span class="ph-title">scanner de transação ativa</span><span class="ph-badge mono" id="tx-id-header">aguardando...</span></div>
    <div class="scanner-area">

      <!-- Radar SVG -->
      <div class="radar-wrap">
        <svg width="320" height="320" viewBox="0 0 320 320" style="position:absolute;inset:0">
          <defs>
            <radialGradient id="sweepGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160,160) scale(140)">
              <stop offset="0%" stop-color="#00ff88" stop-opacity=".3"/>
              <stop offset="70%" stop-color="#00ff88" stop-opacity=".08"/>
              <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
            </radialGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <g class="radar-rings">
            <circle cx="160" cy="160" r="140"/>
            <circle cx="160" cy="160" r="105"/>
            <circle cx="160" cy="160" r="70"/>
            <circle cx="160" cy="160" r="35"/>
          </g>
          <g class="radar-cross">
            <line x1="20" y1="160" x2="300" y2="160"/>
            <line x1="160" y1="20" x2="160" y2="300"/>
            <line x1="61" y1="61" x2="259" y2="259" stroke-dasharray="4,4"/>
            <line x1="259" y1="61" x2="61" y2="259" stroke-dasharray="4,4"/>
          </g>
          <g class="radar-sweep">
            <path class="radar-sweep-path" d="M 160 160 L 160 20 A 140 140 0 0 1 300 160 Z"/>
          </g>
          <!-- Center dot -->
          <circle cx="160" cy="160" r="3" fill="#00ff88" opacity=".8" filter="url(#glow)"/>
        </svg>
        <!-- TX dots injected here -->
        <div id="radar-dots" style="position:absolute;inset:0"></div>
      </div>

      <!-- Scan result panel -->
      <div class="scan-result" id="scan-result" style="opacity:.3">
        <div class="scan-line"><span class="sl-lbl">SCORE</span><span class="sl-val neutral mono" id="sr-score">—</span></div>
        <div class="scan-line"><span class="sl-lbl">VALOR</span><span class="sl-val neutral mono" id="sr-val">—</span></div>
        <div class="scan-line"><span class="sl-lbl">GEO</span><span class="sl-val neutral mono" id="sr-geo">—</span></div>
        <div class="scan-line"><span class="sl-lbl">HORÁRIO</span><span class="sl-val neutral mono" id="sr-hour">—</span></div>
        <div class="scan-line"><span class="sl-lbl">VELOCITY</span><span class="sl-val neutral mono" id="sr-vel">—</span></div>
        <div class="scan-line"><span class="sl-lbl">HISTÓRICO</span><span class="sl-val neutral mono" id="sr-hist">—</span></div>
        <div class="scan-line" style="border-color:#1a2a44"><span class="sl-lbl">VEREDICTO</span><span class="sl-val neutral mono" id="sr-verdict">—</span></div>
      </div>
    </div>

    <div class="active-tx" id="active-tx">
      <div class="atx-item"><span class="atx-lbl">usuário</span><span class="atx-val" id="atx-user">—</span></div>
      <div class="atx-item"><span class="atx-lbl">valor</span><span class="atx-val" id="atx-val">—</span></div>
      <div class="atx-item"><span class="atx-lbl">origem</span><span class="atx-val" id="atx-geo">—</span></div>
      <div class="atx-item"><span class="atx-lbl">veredicto</span><span class="atx-val highlight" id="atx-verdict">—</span></div>
    </div>
  </div>

  <!-- RIGHT: Threat map + feed -->
  <div class="panel" style="grid-row:1/2;display:flex;flex-direction:column">
    <div class="ph"><span class="ph-title">ameaças por país</span><span class="ph-badge mono">ao vivo</span></div>
    <div class="threat-map" id="threat-map"></div>
  </div>

  <!-- BOTTOM: Timeline chart + controls -->
  <div class="bottom-bar">
    <div class="chart-wrap">
      <canvas id="chart" style="width:100%;height:140px"></canvas>
    </div>
    <div class="controls">
      <button class="ctrl-btn active mono" id="btn-auto">⬤ AUTO STREAM</button>
      <button class="ctrl-btn mono" id="btn-inject-sus">INJETAR SUSPEITA</button>
      <button class="ctrl-btn mono" id="btn-inject-fraud">INJETAR FRAUDE</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){

const USERS=[
  {id:'paula',name:'Paula Nogueira',country:'BR'},
  {id:'marcos',name:'Marcos Lima',country:'BR'},
  {id:'tina',name:'Tina Ribeiro',country:'BR'},
  {id:'joao',name:'João Pedroso',country:'BR'},
  {id:'sergio',name:'Sérgio Aoki',country:'BR'},
  {id:'ana',name:'Ana Ferreira',country:'BR'},
];

const COUNTRIES={
  BR:{flag:'🇧🇷',name:'Brasil',risk:0},
  US:{flag:'🇺🇸',name:'EUA',risk:10},
  AR:{flag:'🇦🇷',name:'Argentina',risk:5},
  DE:{flag:'🇩🇪',name:'Alemanha',risk:8},
  NG:{flag:'🇳🇬',name:'Nigéria',risk:35},
  RU:{flag:'🇷🇺',name:'Rússia',risk:30},
  CN:{flag:'🇨🇳',name:'China',risk:18},
  UA:{flag:'🇺🇦',name:'Ucrânia',risk:20},
};

const countryTxCount={};
Object.keys(COUNTRIES).forEach(k=>countryTxCount[k]=0);

const userHist={};
USERS.forEach(u=>{userHist[u.id]={n:0,last:0,country:'BR'}});

const state={total:0,app:0,rev:0,blk:0,alerts:[],autoRunning:true};
let chart;

function fmt(n){return 'R$\u00a0'+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function scoreColor(s){return s<40?'#00ff88':s<70?'#ffb800':'#ff3355'}
function scoreClass(s){return s<40?'low':s<70?'medium':'high'}

function calcScore(userId,amount,country,hour,forceVel){
  const h=userHist[userId];
  let score=0;
  const r=COUNTRIES[country]?.risk||0;
  score+=r;
  if(amount>5000)score+=25;
  if(amount>2000)score+=10;
  if([999,1000,500,2000].some(v=>Math.abs(amount-v)<2))score+=8;
  if(h.n>0&&h.country!==country)score+=30;
  if(hour>=1&&hour<=5)score+=15;
  const now=Date.now();
  if(forceVel||(now-h.last<3500&&h.n>0))score+=28;
  if(h.n===0&&amount>1000)score+=15;
  return Math.min(100,score);
}

// RADAR dots
const radarDots=[];
function addRadarDot(score){
  const dotsEl=document.getElementById('radar-dots');
  const angle=Math.random()*Math.PI*2;
  const dist=40+Math.random()*110;
  const x=160+Math.cos(angle)*dist;
  const y=160+Math.sin(angle)*dist;
  const dot=document.createElement('div');
  dot.className='tx-dot';
  const c=scoreColor(score);
  dot.style.cssText=`left:${x}px;top:${y}px;background:${c};box-shadow:0 0 8px ${c};color:${c}`;
  dotsEl.appendChild(dot);
  radarDots.push(dot);
  if(radarDots.length>18){const old=radarDots.shift();old.style.opacity='0';setTimeout(()=>old.remove(),300)}
}

// Threat map
function updateThreatMap(){
  const el=document.getElementById('threat-map');
  const max=Math.max(1,...Object.values(countryTxCount));
  el.innerHTML=Object.entries(COUNTRIES).map(([k,v])=>{
    const cnt=countryTxCount[k]||0;
    const pct=Math.round(cnt/max*100);
    const barColor=v.risk>25?'#ff3355':v.risk>10?'#ffb800':'#00ff88';
    return `<div class="country-row">
      <span class="cr-flag">${v.flag}</span>
      <span class="cr-name mono">${k}</span>
      <div class="cr-bar-wrap"><div class="cr-bar" style="width:${pct}%;background:${barColor}"></div></div>
      <span class="cr-count mono">${cnt}</span>
    </div>`;
  }).join('');
}

// Alert list
function updateAlertList(){
  const el=document.getElementById('alert-list');
  document.getElementById('queue-count').textContent=state.alerts.length+' eventos';
  el.innerHTML=state.alerts.slice(0,30).map((a,i)=>`
    <div class="alert-item ${a.cls}${i===0&&a.cls==='high'?' new':''}">
      <div class="ai-top">
        <span class="ai-id mono">${a.txId}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="ai-status ${a.cls}">${a.cls==='low'?'OK':a.cls==='medium'?'REVISÃO':'FRAUDE'}</span>
          <span class="ai-score ${a.cls} mono">${Math.round(a.score)}</span>
        </div>
      </div>
      <div class="ai-user">${a.userName}</div>
      <div class="ai-meta"><span>${a.country} ${COUNTRIES[a.country]?.flag||''}</span><span>${fmt(a.amount)}</span><span>${a.time}</span></div>
    </div>`).join('');
}

// Top stats
function updateStats(){
  document.getElementById('st-app').textContent=state.app;
  document.getElementById('st-rev').textContent=state.rev;
  document.getElementById('st-blk').textContent=state.blk;
  document.getElementById('st-total').textContent=state.total;
  const ratio=state.total?state.blk/state.total:0;
  const tl=document.getElementById('threat-lvl');
  if(ratio<0.1){tl.className='threat-level tl-low mono';tl.textContent='THREAT: LOW'}
  else if(ratio<0.25){tl.className='threat-level tl-med mono';tl.textContent='THREAT: MEDIUM'}
  else{tl.className='threat-level tl-high mono';tl.textContent='THREAT: HIGH'}
}

// Scan panel
async function runScan(tx){
  const sr=document.getElementById('scan-result');
  sr.style.opacity='1';
  document.getElementById('tx-id-header').textContent=tx.txId;
  document.getElementById('atx-user').textContent=tx.userName;
  document.getElementById('atx-val').textContent=fmt(tx.amount);
  document.getElementById('atx-geo').textContent=(COUNTRIES[tx.country]?.flag||'')+' '+tx.country;
  document.getElementById('atx-verdict').textContent='ANALISANDO...';
  document.getElementById('atx-verdict').style.color='#5588bb';

  const fields=[
    {id:'sr-score',val:Math.round(tx.score),cls:scoreClass(tx.score)},
    {id:'sr-val',val:fmt(tx.amount),cls:tx.amount>5000?'bad':tx.amount>2000?'warn':'ok'},
    {id:'sr-geo',val:(COUNTRIES[tx.country]?.flag||'')+' '+tx.country,cls:COUNTRIES[tx.country]?.risk>25?'bad':COUNTRIES[tx.country]?.risk>10?'warn':'ok'},
    {id:'sr-hour',val:tx.hour+':00h',cls:tx.hour>=1&&tx.hour<=5?'warn':'ok'},
    {id:'sr-vel',val:tx.velocity?'DETECTADA':'normal',cls:tx.velocity?'bad':'ok'},
    {id:'sr-hist',val:tx.newUser?'NOVO USUÁRIO':'recorrente',cls:tx.newUser?'warn':'ok'},
  ];

  for(const f of fields){
    const el=document.getElementById(f.id);
    el.textContent='—';
    el.className='sl-val neutral mono';
    await sleep(90);
    el.textContent=f.val;
    el.className='sl-val '+f.cls+' mono';
  }

  await sleep(150);
  const vEl=document.getElementById('sr-verdict');
  const atxV=document.getElementById('atx-verdict');
  const cls=scoreClass(tx.score);
  const lbl=cls==='low'?'APROVADA':cls==='medium'?'SOB REVISÃO':'BLOQUEADA';
  vEl.textContent=lbl;
  vEl.className='sl-val '+(cls==='low'?'ok':cls==='medium'?'warn':'bad')+' mono';
  atxV.textContent=lbl;
  atxV.style.color=scoreColor(tx.score);
}

// Chart
function initChart(){
  const ctx=document.getElementById('chart');
  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels:[],
      datasets:[
        {label:'Score',data:[],borderColor:'#3366cc',backgroundColor:'rgba(51,102,204,.06)',fill:true,borderWidth:1.5,pointRadius:2,tension:.3,
         segment:{borderColor:ctx=>scoreColor(ctx.p1.parsed.y),pointBackgroundColor:ctx=>scoreColor(ctx.raw)}},
        {label:'Rev',data:[],borderColor:'rgba(255,184,0,.4)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false},
        {label:'Blk',data:[],borderColor:'rgba(255,51,85,.4)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:200},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label==='Score'?'Score: '+ctx.raw:null}}},
      scales:{
        x:{ticks:{color:'#2a3a55',maxRotation:0,autoSkip:true,font:{family:'Share Tech Mono',size:9}},grid:{color:'#0d1220'}},
        y:{min:0,max:100,ticks:{color:'#2a3a55',font:{family:'Share Tech Mono',size:9}},grid:{color:'#0d1220'}}
      }
    }
  });
}

function pushChart(label,score){
  chart.data.labels.push(label);
  chart.data.datasets[0].data.push(Math.round(score));
  chart.data.datasets[1].data.push(40);
  chart.data.datasets[2].data.push(70);
  if(chart.data.labels.length>40){chart.data.labels.shift();chart.data.datasets.forEach(d=>d.data.shift())}
  chart.update();
}

let scanQueue=[];
let scanning=false;

async function drainQueue(){
  if(scanning)return;
  scanning=true;
  while(scanQueue.length>0){
    const tx=scanQueue.shift();
    await runScan(tx);
    await sleep(200);
  }
  scanning=false;
}

function processTx(tx){
  const cls=scoreClass(tx.score);
  state.total++;
  if(cls==='low')state.app++;
  else if(cls==='medium')state.rev++;
  else state.blk++;

  countryTxCount[tx.country]=(countryTxCount[tx.country]||0)+1;
  state.alerts.unshift(tx);
  if(state.alerts.length>60)state.alerts.pop();

  addRadarDot(tx.score);
  updateAlertList();
  updateStats();
  updateThreatMap();
  pushChart(tx.time,tx.score);

  scanQueue.push(tx);
  drainQueue();
}

function genTx(overrides={}){
  const user=pick(USERS);
  const h=userHist[user.id];
  const country=overrides.country||pick(Object.keys(COUNTRIES));
  const amount=overrides.amount||rnd(20,8000);
  const hour=overrides.hour||rnd(0,23);
  const velocity=overrides.velocity||false;
  const score=calcScore(user.id,amount,country,hour,velocity);
  const txId='TX-'+Math.random().toString(36).slice(2,8).toUpperCase();
  const time=new Date().toLocaleTimeString('pt-BR');
  const newUser=h.n===0;
  const tx={txId,userId:user.id,userName:user.name,amount,country,hour,score,time,cls:scoreClass(score),velocity,newUser};
  h.n++;h.last=Date.now();h.country=country;
  return tx;
}

// AUTO STREAM
let autoTimer=null;
function startAuto(){
  if(autoTimer)return;
  autoTimer=setInterval(()=>{
    if(!state.autoRunning)return;
    const tx=genTx({country:pick(['BR','BR','BR','BR','US','AR','NG','RU','CN','DE'])});
    processTx(tx);
  },1800);
}

document.getElementById('btn-auto').addEventListener('click',()=>{
  state.autoRunning=!state.autoRunning;
  const btn=document.getElementById('btn-auto');
  btn.classList.toggle('active',state.autoRunning);
  btn.textContent=state.autoRunning?'⬤ AUTO STREAM':'○ AUTO STREAM';
});

document.getElementById('btn-inject-sus').addEventListener('click',()=>{
  processTx(genTx({country:pick(['NG','RU','CN']),amount:rnd(3000,6000),hour:3}));
});

document.getElementById('btn-inject-fraud').addEventListener('click',()=>{
  processTx(genTx({country:pick(['NG','RU']),amount:rnd(4000,9000),hour:2,velocity:true}));
});

updateThreatMap();
initChart();
startAuto();

// Seed inicial
setTimeout(()=>processTx(genTx({country:'BR',amount:250,hour:14})),600);
setTimeout(()=>processTx(genTx({country:'US',amount:1800,hour:14})),1400);

})();
</script>
